<!doctype html>

    <script>
        window.onload=()=>{
            const mobileMenuIcon = document.getElementById('mobile-menu-button');
            mobileMenuIcon.addEventListener("click", ()=>{
                if(mobileMenuIcon.classList.contains("open")){
                    mobileMenuIcon.classList.remove("open");
                }
                else{
                    mobileMenuIcon.classList.add("open");
                }
            })
        }
    </script>
  
    <nav class="flex sticky top-0 bg-linear-to-r from-rose-500 to-pink-500">
        <div>Logo</div>
        <div class="block md:hidden ml-auto my-auto cursor-pointer pr-4">
            <div id="mobile-menu-button" class="group peer">
    
    <!-- top line -->
    <div class="bg-zinc-200 rounded-full w-8 h-1 transition-all
    relative top-0
    group-open:rotate-45
    group-open:top-2"></div>

    <!-- middle line -->
    <div class="opacity-100 bg-zinc-200 mt-1 rounded-full w-8 h-1 transition-all
    group-open:opacity-0"></div>

    <!-- bottom line -->
    <div class="bg-zinc-200 rounded-full w-8 h-1 transition-all
    relative
    group-open:-rotate-45
    group-open:-top-2"></div>

</div>
